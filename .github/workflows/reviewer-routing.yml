name: Reviewer Routing

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  routing:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate CODEOWNERS
        run: |
          if [ ! -f ".github/CODEOWNERS" ]; then
            echo "⚠️ No .github/CODEOWNERS file found — review routing is unconfigured"
          else
            echo "✅ CODEOWNERS file present"
          fi